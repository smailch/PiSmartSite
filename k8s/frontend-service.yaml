# UI accessible depuis l’extérieur du cluster (navigateur → IP d’un nœud :30080).
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: pismartsite
    component: frontend
spec:
  type: NodePort
  selector:
    app: pismartsite
    component: frontend
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30080
      name: http
