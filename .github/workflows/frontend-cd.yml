# CD Frontend — s’exécute UNIQUEMENT après succès de « Frontend CI » sur main/master.
# Déploiement : hook HTTP (Vercel, Netlify, Firebase) ou Vercel CLI, via secrets.
name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [main, master]

concurrency:
  group: frontend-cd-prod
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.event == 'push'
    steps:
      - name: Checkout (commit testé en CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Rappel contexte
        run: |
          echo "Déploiement suite au workflow: ${{ github.event.workflow_run.name }}"
          echo "Branche: ${{ github.event.workflow_run.head_branch }}"
          echo "SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Déclenché par: ${{ github.event.workflow_run.actor.login }}"

      - name: Deploy via deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo '::warning::Secret FRONTEND_DEPLOY_HOOK_URL manquant — Vercel / Netlify (voir docs/CI-CD-SETUP.md). Déploiement ignoré.'
            exit 0
          fi
          echo "POST deploy hook…"
          curl -fsS -X POST --retry 2 --retry-delay 5 -H "Accept: application/json" "$DEPLOY_HOOK"
          echo "OK — hook invoqué."

      - name: Vercel CLI (optionnel, désactivé par défaut)
        if: false
        run: |
          echo "Alternative : pnpm dlx vercel@latest pull --token=\$VERCEL_TOKEN && pnpm dlx vercel@latest --prod"
          # secrets : VERCEL_ORG_ID, VERCEL_PROJECT_ID, VERCEL_TOKEN (voir doc Vercel + GitHub)
