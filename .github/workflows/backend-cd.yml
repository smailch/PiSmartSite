# CD Backend — s’exécute UNIQUEMENT après succès de « Backend CI » sur main/master.
# Déploiement : hook HTTP (Render, Railway, Netlify, etc.) ou autre, via secrets.
name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    # N’enfile le CD que si le Backend CI a tourné sur main/master (évite 2× CD par push preprod+main)
    branches: [main, master]

concurrency:
  group: backend-cd-prod
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.event == 'push'
    steps:
      - name: Checkout (commit testé en CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Rappel contexte
        run: |
          echo "Déploiement suite au workflow: ${{ github.event.workflow_run.name }}"
          echo "Branche: ${{ github.event.workflow_run.head_branch }}"
          echo "SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Déclenché par: ${{ github.event.workflow_run.actor.login }}"

      - name: Deploy via deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo '::warning::Secret BACKEND_DEPLOY_HOOK_URL manquant — crée le hook sur Render / Railway (voir docs/CI-CD-SETUP.md). Déploiement ignoré.'
            exit 0
          fi
          echo "POST deploy hook (aucune clé affichée)…"
          curl -fsS -X POST --retry 2 --retry-delay 5 -H "Accept: application/json" "$DEPLOY_HOOK"
          echo "OK — hook invoqué."

      - name: Docker push (optionnel, désactivé par défaut)
        if: false
        run: |
          echo "Décommente ce job + secrets (registry) pour pousser une image."
          # Exemple: docker build -t your-registry/smartsite-backend:$SHA smartsite-backend
